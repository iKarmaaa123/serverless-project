name: Prod Workflow

on:
  push:
    paths:
    - "envs/prod/**"

  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read 

jobs:
  plan:
    name: Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./envs/prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: ./modules/lambda

      - name: Run Python unit tests
        run: python -m unittest
        working-directory: ./modules/lambda/test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configuring AWS Crdentials for GitHub Actions Runner
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.GHA_RUNNER_OIDC_ROLE }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .
      
      - name: Terraform Validate
        run: terraform validate
        working-directory: .

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6
      
      - name: Initialising TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint -f compact
        working-directory: .

      - name: Running Checkov Scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7
        with:
          directory: ./envs/prod
          framework: terraform
          quiet: true
          soft_fail: true
          format: table
        
      - name: Terraform Plan
        run: terraform plan -var-file=prod.tfvars

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: prod
    needs: plan
    defaults:
      run:
        working-directory: ./envs/prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Configuring AWS Crdentials for GitHub Actions Runner
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.GHA_RUNNER_OIDC_ROLE }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file=prod.tfvars -auto-approve

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: prod
    needs: apply
    defaults:
      run:
        working-directory: ./envs/prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Configuring AWS Crdentials for GitHub Actions Runner
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.GHA_RUNNER_OIDC_ROLE }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -var-file=prod.tfvars -auto-approve    